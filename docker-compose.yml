version: '3.8'

services:
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: ./frontend/.env.local
    depends_on: [backend]
    command: npm run dev

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000
